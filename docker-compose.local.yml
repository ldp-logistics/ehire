# Local stack: no Traefik/reverse proxy. App is reachable at http://localhost:5000
#
# Dev + hot reload: repo is bind-mounted; `node_modules` uses a named volume (Linux binaries).
# On start, npm install runs automatically when package.json / package-lock.json change (or the
# volume is empty). No need to delete the volume after every dependency add — restart `up` is enough.
# Force refresh: `docker compose -f docker-compose.local.yml run --rm app npm install --ignore-scripts`
# or remove the node_modules volume, then `up --build` again.
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build
#
# Database:
#   - If `.env` sets DATABASE_URL (e.g. Neon), that value is used and Postgres below is optional.
#   - Otherwise defaults to the bundled Postgres service (postgresql://ldp:ldp@postgres:5432/ldp_hrm).
#
# First run against bundled Postgres: run migrations from the host or a one-off container, e.g.
#   DATABASE_URL=postgresql://ldp:ldp@localhost:5432/ldp_hrm npm run db:push
#   (port 5432 is published below for host-side tools.)

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ldp
      POSTGRES_PASSWORD: ldp
      POSTGRES_DB: ldp_hrm
    ports:
      - "5432:5432"
    volumes:
      - ldp_hrm_pgdata_local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ldp -d ldp_hrm"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      PORT: "5000"
      NODE_ENV: development
      # Bind mounts on Windows/macOS often miss fs events; Vite/chokidar pick up changes via polling.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      # Use DATABASE_URL from .env when set; else bundled Postgres on the compose network.
      DATABASE_URL: ${DATABASE_URL:-postgresql://ldp:ldp@postgres:5432/ldp_hrm}
    ports:
      - "5000:5000"
    volumes:
      - .:/app
      - ldp_hrm_app_node_modules:/app/node_modules
    command: >
      sh -c "
        DEPS_HASH=$$(cat package.json package-lock.json 2>/dev/null | sha256sum | awk '{print $$1}');
        CACHED=$$(cat node_modules/.deps.sha256 2>/dev/null || true);
        if [ ! -x node_modules/.bin/tsx ] || [ \"$$DEPS_HASH\" != \"$$CACHED\" ]; then
          echo '>> npm install (new/changed dependencies or empty node_modules volume)';
          npm install --ignore-scripts;
          echo \"$$DEPS_HASH\" > node_modules/.deps.sha256;
        fi;
        exec npm run dev
      "
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  ldp_hrm_pgdata_local:
  ldp_hrm_app_node_modules:
